spring.application.name=plataforma-educativa
server.port=8080

# -------------------------------------------------------
# Oracle Autonomous Database - Wallet
# IMPORTANTE: reemplaza DB_PASSWORD con tu contraseña real
# -------------------------------------------------------
spring.datasource.url=jdbc:oracle:thin:@mi3rabdd_low?TNS_ADMIN=/app/wallet
spring.datasource.username=ADMIN
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.cl.duoc=INFO
logging.level.org.springframework.web=INFO
